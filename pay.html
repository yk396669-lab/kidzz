<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Order Confirmation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .confirmation-container {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
        }
        .confirmation-container h1 {
            color: #4CAF50;
            margin-bottom: 20px;
        }
        .confirmation-container p {
            color: #333;
            margin-bottom: 20px;
        }
        .confirmation-container button {
            background-color: #4CAF50;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .confirmation-container button:hover {
            background-color: #cebb2e;
        }
    </style>
</head>
<body>
    <div class="confirmation-container">
        <h1>Order Placed Successfully!</h1>
        <p>Thank you for your purchase. Your order has been placed successfully and is being processed.</p>
        <p>Order Number: <strong>#123456</strong></p>
        <p>You will receive an email confirmation shortly.</p>
        <button onclick="window.location.href='shop.html'">Continue Shopping</button>
    </div>
</body>
</html>
