<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Payment Form</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .payment-form {
            background-color: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
            width: 100%;
        }
        .payment-form h2 {
            margin-bottom: 20px;
            color: #333;
        }
        .payment-form label {
            display: block;
            margin-bottom: 10px;
            color: #333;
        }
        .payment-form input {
            width: 100%;
            padding: 10px;
            margin-bottom: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }
        .payment-form button {
            background-color: #08f046;
            color: white;
            padding: 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        .payment-form button:hover {
            background-color: #c9c918;
        }
    </style>
</head>
<body>
    <div class="payment-form">
        <h2>Address Details</address></h2>
        <form action="pay.html" >
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="card-number">Phone Number</label>
            <input type="text" id="card-number" name="card-number" required>

            <label for="exp-month">Address</label>
            <input type="text" id="exp-month" name="exp-month" required>

            <label for="exp-year">Landmark</label>
            <input type="text" id="exp-year" name="exp-year" required>

            <label for="cvv">Pincode</label>
            <input type="text" id="cvv" name="cvv" required>

            <button type="submit">Pay on delivery</button>
        </form>
    </div>
</body>
</html>
